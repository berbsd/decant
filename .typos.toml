[files]
# CHANGELOG.md is generated by git-cliff from commit subjects (immutable
# history), so spell-checking it just re-flags words from old commit messages.
extend-exclude = ["target/", "*.lock", ".claude/", "CHANGELOG.md"]

[default]
# Base64-encoded examples (JWTs, cursors) start with `ey` and produce
# false positives. Skip any contiguous base64 run anchored on `ey`.
# extend-ignore-re = ["ey[A-Za-z0-9+/=]{16,}"]

[default.extend-words]
# ISO 3166-2 state code for North Dakota — typos wants to fix it to AND.
ND      = "ND"
ratatui = "ratatui"
