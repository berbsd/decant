# Dependabot keeps dependencies current by opening PRs when newer versions
# ship. https://docs.github.com/code-security/dependabot
version: 2
updates:
  # GitHub Actions pinned in .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    # Batch minor/patch into one PR; majors stay separate for review.
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Cargo dependencies across the workspace
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
    # Batch minor/patch into one PR; majors stay separate for review.
    groups:
      cargo:
        patterns: ["*"]
        update-types: ["minor", "patch"]
