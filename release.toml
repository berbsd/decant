# =============================================================================
# cargo-release Configuration
# =============================================================================
# Automates version bumping, git tagging, and optional publishing.
# Documentation: https://github.com/crate-ci/cargo-release
#
# Usage:
#   cargo release patch              # 0.1.0 -> 0.1.1
#   cargo release minor              # 0.1.0 -> 0.2.0
#   cargo release major              # 0.1.0 -> 1.0.0
#   cargo release patch --dry-run    # Preview without changes
#
# In a workspace, crates are released in dependency order automatically.
# =============================================================================

# Do not publish to crates.io by default (internal project)
# Set to true or remove for open-source crates
publish = false

# All workspace crates share one version (via `version.workspace = true`), so
# bump and tag them together as a single unit — one commit, one `vX.Y.Z` tag.
shared-version = true

# Push commits and tags to remote after release
push = true

# Create git tags for releases
tag = true

# Tag format: v0.1.0
tag-name = "v{{version}}"

# Tag message format. Use the literal product name, not `{{crate_name}}`:
# this is a single shared-version tag, and `{{crate_name}}` would resolve to
# the first workspace crate (e.g. `decant-agents`), not the product.
tag-message = "release: decant v{{version}}"

# Run `just check` before releasing
pre-release-hook = ["just", "check"]

# Commit message for the consolidated version bump. `{{crate_name}}` is NOT
# available in this workspace-wide commit context (it would be left literal),
# so use only `{{version}}`.
pre-release-commit-message = "chore(release): v{{version}}"
