[[step]]
type = "strip_ansi"

[[step]]
type    = "drop"
pattern = '^\s*(Compiling|Finished|Running|Doc-tests) '

[[step]]
type    = "drop"
pattern = '^test .* \.\.\. ok$'

[[step]]
type = "dedup"

# Cap at 120 lines, but rank by signal instead of position: failures, panics,
# and compile errors are force-kept wherever they fall, so a panic buried in a
# long run survives a cut that `truncate tail` would sever. `pattern` overrides
# rank's generic error signal with cargo-test's failure markers.
[[step]]
type    = "rank"
budget  = 120
pattern = 'FAILED|panicked|^failures:|^error'
