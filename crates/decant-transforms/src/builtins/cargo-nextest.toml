[[step]]
type = "strip_ansi"

[[step]]
type    = "drop"
pattern = '^\s*(Compiling|Finished) '

[[step]]
type    = "drop"
pattern = '^\s*─+\s*$'

[[step]]
type    = "drop"
pattern = 'Nextest run ID '

[[step]]
type    = "drop"
pattern = '^\s*PASS '

[[step]]
type = "dedup"

[[step]]
type      = "truncate"
max_lines = 120
keep      = "tail"
