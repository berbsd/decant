[[step]]
type = "strip_ansi"

[[step]]
type    = "drop"
pattern = '^\s*(Compiling|Finished) '

[[step]]
type    = "drop"
pattern = '^\s*─+\s*$'

[[step]]
type    = "drop"
pattern = 'Nextest run ID '

[[step]]
type    = "drop"
pattern = '^\s*PASS '

[[step]]
type = "dedup"

# Cap at 120 lines, ranking by signal: nextest's `FAIL` markers, panics, and
# the run summary are force-kept wherever they fall, so a failure buried among
# hundreds of passing lines survives a cut `truncate tail` would sever.
[[step]]
type    = "rank"
budget  = 120
pattern = 'FAIL|panicked|failed|^error'
