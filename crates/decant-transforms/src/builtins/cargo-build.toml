[[step]]
type = "strip_ansi"

[[step]]
type    = "collapse"
pattern = '^\s*Compiling '
label   = "{n} crates compiled"

[[step]]
type    = "drop"
pattern = '^\s*Finished '

# Cap at 100 lines, ranking by signal: compile `error[...]` / `error:` lines and
# `warning:` diagnostics are force-kept wherever they fall, so a failure is never
# cut by position. `pattern` keeps both errors and warnings (a build's signal).
[[step]]
type    = "rank"
budget  = 100
pattern = '^error|^warning:'
