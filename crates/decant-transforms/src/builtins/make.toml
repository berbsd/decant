[[step]]
type = "strip_ansi"

[[step]]
type    = "drop"
pattern = '^make\[\d+\]:'

[[step]]
type    = "drop"
pattern = '^\s*$'

# Cap at 50 lines, ranking by signal: compiler `error:` lines and make's
# `*** Error` summary are force-kept wherever they fall (rank's built-in
# error/fatal/failed signal covers them), so a failure is never cut by position.
[[step]]
type   = "rank"
budget = 50
