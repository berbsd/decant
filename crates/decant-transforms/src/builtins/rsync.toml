[[step]]
type = "strip_ansi"

[[step]]
type    = "drop"
pattern = '^\s*$'

[[step]]
type    = "drop"
pattern = '^sending incremental file list'

[[step]]
type    = "drop"
pattern = '^Transfer starting:'

[[step]]
type    = "drop"
pattern = '^sent \d'

[[step]]
type    = "drop"
pattern = '^total size is'

[[step]]
type      = "truncate"
max_lines = 20
keep      = "tail"
